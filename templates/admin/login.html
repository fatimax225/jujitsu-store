<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Jujita Gifts</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#6B2737,#2C0F18); }
    </style>
</head>
<body>
<div style="width:100%;max-width:420px;padding:24px;">
    <div style="text-align:center;margin-bottom:36px;">
        <div style="font-family:var(--font-display);font-size:40px;font-weight:700;color:#fff;">Jujita</div>
        <div style="font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;">Admin Portal</div>
    </div>
    <div class="form-card">
        <h2 style="font-family:var(--font-display);font-size:28px;color:var(--burgundy);text-align:center;margin-bottom:6px;">Sign In</h2>
        <p style="text-align:center;color:var(--mid-gray);font-size:13px;margin-bottom:28px;">Admin access only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}" style="position:relative;top:0;right:0;max-width:100%;margin-bottom:16px;border-radius:6px;">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div id="login-error" style="display:none;background:#f8d7da;color:#721c24;padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:16px;"></div>

        <div class="form-group">
            <label for="u">Username</label>
            <input type="text" id="u" class="form-control"
                   placeholder="jojo" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
            <label for="p">Password</label>
            <input type="password" id="p" class="form-control" placeholder="••••••••">
        </div>
        <button id="login-btn" class="btn btn-primary" style="width:100%;margin-top:8px;">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <script>
            // Submit via fetch — no HTML form, no browser email validation
            function doLogin() {
                const username = document.getElementById('u').value.trim();
                const password = document.getElementById('p').value.trim();
                const btn = document.getElementById('login-btn');
                const err = document.getElementById('login-error');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                err.style.display = 'none';

                const body = new URLSearchParams();
                body.append('username', username);
                body.append('password', password);

                fetch('/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: body.toString(),
                    redirect: 'follow'
                })
                .then(res => {
                    if (res.ok && res.url.includes('/admin') && !res.url.includes('/login')) {
                        window.location.href = '/admin';
                    } else {
                        return res.text().then(html => {
                            err.textContent = 'Invalid username or password.';
                            err.style.display = 'block';
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                        });
                    }
                })
                .catch(() => {
                    err.textContent = 'Connection error. Please try again.';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                });
            }

            document.getElementById('login-btn').addEventListener('click', doLogin);
            document.getElementById('p').addEventListener('keydown', e => {
                if (e.key === 'Enter') doLogin();
            });
            document.getElementById('u').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('p').focus();
            });
        </script>

        <div style="text-align:center;margin-top:20px;">
            <a href="{{ url_for('index') }}" style="font-size:12px;color:var(--mid-gray);">← Back to Store</a>
        </div>
    </div>
</div>
</body>
</html>
